services:
  web:
    image: ghcr.io/fuukasyafiq/distrozone-nginx:latest
    restart: unless-stopped
    volumes:
      - laravel-storage-production:/var/www/storage:ro
      - laravel-public-assets:/var/www/public/build:ro
    networks:
      - distrozone
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      php-fpm:
        condition: service_healthy

  php-fpm:
    image: ghcr.io/fuukasyafiq/distrozone-php-fpm:latest
    pull_policy: always
    restart: unless-stopped
    volumes:
      - laravel-storage-production:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:HCSuM3fclICIwW9zrigAaWViZBqVvls55oAD7MeybA4=
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-distrozone}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-distrozone123}
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=sync
      - SESSION_DRIVER=cookie
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-distrozone}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-distrozone123}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=${AWS_BUCKET:-distrozone}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-}
    networks:
      - distrozone
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-distrozone}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-distrozone123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - distrozone
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID:-distrozone}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY:-distrozone123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - distrozone
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  distrozone:

volumes:
  postgres-data:
  laravel-storage-production:
  laravel-public-assets:
  minio-data:
